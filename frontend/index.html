<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acme Dental — Receptionist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 420px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      background: #1a6fbe;
      color: #fff;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-header .avatar {
      width: 40px;
      height: 40px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .chat-header .info h2 { font-size: 15px; font-weight: 600; }
    .chat-header .info p  { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .message.agent {
      background: #f0f4f8;
      color: #1e293b;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .message.user {
      background: #1a6fbe;
      color: #fff;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }

    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
      background: #f0f4f8;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .typing span {
      width: 7px; height: 7px;
      background: #94a3b8;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    /* Input area */
    .chat-input {
      border-top: 1px solid #e2e8f0;
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .chat-input textarea {
      flex: 1;
      resize: none;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.4;
      max-height: 120px;
      outline: none;
      transition: border-color 0.15s;
    }
    .chat-input textarea:focus { border-color: #1a6fbe; }
    .chat-input button {
      width: 40px;
      height: 40px;
      background: #1a6fbe;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .chat-input button:hover  { background: #1558a0; }
    .chat-input button:disabled { background: #94a3b8; cursor: not-allowed; }
    .chat-input button svg { width: 18px; height: 18px; fill: #fff; }

    /* Error banner */
    .error-banner {
      background: #fef2f2;
      color: #b91c1c;
      font-size: 12px;
      text-align: center;
      padding: 8px 16px;
      display: none;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">🦷</div>
    <div class="info">
      <h2>Acme Dental Receptionist</h2>
      <p><span class="status-dot"></span>Online — here to help</p>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="error-banner" id="error-banner">Could not reach the server. Is the API running?</div>

  <div class="chat-input">
    <textarea
      id="input"
      rows="1"
      placeholder="Type a message…"
      aria-label="Message input"
    ></textarea>
    <button id="send-btn" aria-label="Send message">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  // When opened via Docker (nginx), use relative path. When opened as a file, use localhost.
  const API_URL = window.location.protocol === "file:"
    ? "http://localhost:8000/chat/"
    : "/chat/";

  const messagesEl  = document.getElementById("messages");
  const inputEl     = document.getElementById("input");
  const sendBtn     = document.getElementById("send-btn");
  const errorBanner = document.getElementById("error-banner");

  // Unique session ID per browser tab — groups conversation logs in the DB
  const SESSION_ID = crypto.randomUUID();

  function appendMessage(text, role) {
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const el = document.createElement("div");
    el.className = "typing";
    el.id = "typing-indicator";
    el.innerHTML = "<span></span><span></span><span></span>";
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    document.getElementById("typing-indicator")?.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    errorBanner.style.display = "none";
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;

    appendMessage(text, "user");
    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, session_id: SESSION_ID }),
      });

      removeTyping();

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      appendMessage(data.response, "agent");
    } catch (err) {
      removeTyping();
      errorBanner.style.display = "block";
      console.error(err);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = inputEl.scrollHeight + "px";
  });

  // Send on Enter (Shift+Enter for newline)
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener("click", sendMessage);

  // Greeting on load
  appendMessage("Hello! I'm Aria, the Acme Dental receptionist. How can I help you today?", "agent");
  inputEl.focus();
</script>

</body>
</html>
