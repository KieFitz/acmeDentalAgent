services:
  backend:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////app/data/acmedental.db
    volumes:
      - db_data:/app/data
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
